<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Dashboard{% endblock %} — Vantum Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a5c;--navy-dark:#122840;--navy-light:#eef2f7;--border:#e5e7eb;--bg:#f4f6f9;--white:#fff;--text:#111827;--mid:#374151;--faint:#6b7280;--green:#16a34a;--green-bg:#f0fdf4;--yellow:#d97706;--yellow-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--sidebar:240px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar);background:var(--navy);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.s-logo{padding:1.25rem 1.5rem 1.125rem;border-bottom:1px solid rgba(255,255,255,0.1)}
.s-logo svg{height:20px;width:auto;display:block}
.s-logo span{display:block;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:5px}
.s-nav{flex:1;padding:0.75rem 0}
.s-section{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:0.875rem 1.5rem 0.375rem}
.s-link{display:flex;align-items:center;gap:0.75rem;padding:0.625rem 1.5rem;color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.8375rem;font-weight:500;transition:all 0.15s;border-left:3px solid transparent}
.s-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.s-link.active{background:rgba(255,255,255,0.13);color:#fff;border-left-color:#fff}
.s-link svg{width:15px;height:15px;flex-shrink:0;opacity:0.65}
.s-link:hover svg,.s-link.active svg{opacity:1}
.s-footer{padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,0.1)}
.s-footer a{display:flex;align-items:center;gap:0.5rem;color:rgba(255,255,255,0.45);font-size:0.8rem;text-decoration:none}
.s-footer a:hover{color:#fff}
.main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 1.75rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:0.9375rem;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:1.25rem;font-size:0.8125rem;color:var(--faint)}
.topbar-right a{color:var(--navy);text-decoration:none;font-weight:500}
.content{padding:1.75rem;flex:1}
.msgs{margin-bottom:1.25rem}
.msg{padding:0.75rem 1rem;border-radius:6px;font-size:0.875rem;border-left:3px solid;margin-bottom:0.5rem}
.msg.success{background:var(--green-bg);color:#166534;border-color:var(--green)}
.msg.error{background:var(--red-bg);color:#991b1b;border-color:var(--red)}
.msg.warning{background:var(--yellow-bg);color:#92400e;border-color:var(--yellow)}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem}
.ph h1{font-family:'Libre Baskerville',serif;font-size:1.5rem;font-weight:400;color:var(--text)}
.ph p{font-size:0.875rem;color:var(--faint);margin-top:0.25rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem}
.stat.navy{background:var(--navy);border-color:var(--navy)}
.stat-label{font-size:0.7rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--faint);margin-bottom:0.5rem}
.stat.navy .stat-label{color:rgba(255,255,255,0.55)}
.stat-val{font-size:2.25rem;font-weight:700;color:var(--text);line-height:1}
.stat.navy .stat-val{color:#fff}
.stat-sub{font-size:0.75rem;color:var(--faint);margin-top:0.375rem}
.stat.navy .stat-sub{color:rgba(255,255,255,0.45)}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.25rem}
.card-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:0.875rem;font-weight:600;color:var(--text)}
.card-body{padding:1.5rem}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:#f9fafb;color:var(--faint);font-size:0.695rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:10px 16px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
tbody td{padding:11px 16px;font-size:0.875rem;color:var(--mid);border-bottom:1px solid #f3f4f6;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbfc}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:0.695rem;font-weight:600;white-space:nowrap}
.bg{background:var(--green-bg);color:#166534}
.by{background:var(--yellow-bg);color:#92400e}
.br{background:var(--red-bg);color:#991b1b}
.bb{background:var(--navy-light);color:var(--navy)}
.bgr{background:#f3f4f6;color:var(--faint)}
.btn{display:inline-flex;align-items:center;gap:0.375rem;padding:0.5rem 1rem;border-radius:6px;font-size:0.8125rem;font-weight:500;cursor:pointer;text-decoration:none;border:none;transition:all 0.15s;font-family:'Inter',sans-serif;line-height:1.2}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-dark)}
.btn-outline{background:#fff;color:var(--navy);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--navy);background:var(--navy-light)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-ghost{background:transparent;color:var(--faint);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:0.3rem 0.7rem;font-size:0.75rem}
.filters{background:#fff;border:1px solid var(--border);border-radius:8px;padding:0.875rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap}
.sinp{flex:1;min-width:180px;padding:0.5rem 0.875rem;border:1px solid var(--border);border-radius:6px;font-size:0.875rem;font-family:'Inter',sans-serif}
.sinp:focus{border-color:var(--navy);outline:none}
.fsel{padding:0.5rem 0.875rem;border:1px solid var(--border);border-radius:6px;font-size:0.875rem;font-family:'Inter',sans-serif;color:var(--mid);background:#fff;cursor:pointer}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.fg{display:flex;flex-direction:column;gap:0.375rem}
.fg.full{grid-column:1/-1}
.fg label{font-size:0.8125rem;font-weight:500;color:var(--mid)}
.fg label.req::after{content:' *';color:var(--red)}
.fg input,.fg textarea,.fg select{width:100%;padding:0.5625rem 0.875rem;border:1px solid var(--border);border-radius:6px;font-size:0.875rem;color:var(--text);font-family:'Inter',sans-serif;background:#fff}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--navy);outline:none;box-shadow:0 0 0 3px rgba(26,58,92,0.08)}
.fg textarea{resize:vertical;min-height:90px}
.fg .hint{font-size:0.75rem;color:var(--faint)}
.check-row{display:flex;align-items:center;gap:0.5rem;padding:0.25rem 0}
.check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--navy);cursor:pointer;flex-shrink:0}
.check-row label{font-size:0.875rem;color:var(--mid);cursor:pointer;margin:0}
.file-zone{border:2px dashed var(--border);border-radius:8px;padding:1.25rem;text-align:center;cursor:pointer;transition:all 0.15s;position:relative}
.file-zone:hover{border-color:var(--navy);background:var(--navy-light)}
.file-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-zone-text{font-size:0.8rem;color:var(--faint);pointer-events:none}
.file-zone-text strong{color:var(--navy)}
.cur-img img{max-height:90px;border-radius:6px;border:1px solid var(--border);margin-top:8px}
.cur-img p{font-size:0.7rem;color:var(--faint);margin-top:4px}
.pimg{width:42px;height:42px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
.pimg-ph{width:42px;height:42px;border-radius:6px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:0.55rem;color:var(--faint);text-align:center;line-height:1.2}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start}
.dr{padding:0.75rem 0;border-bottom:1px solid #f3f4f6;display:flex;gap:1rem}
.dr:last-child{border-bottom:none}
.dl{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--faint);min-width:120px;padding-top:1px;flex-shrink:0}
.dv{font-size:0.875rem;color:var(--text)}
.empty{text-align:center;padding:3rem 1rem}
.empty p{color:var(--faint);font-size:0.875rem;margin-top:0.5rem}
.form-footer{display:flex;align-items:center;gap:0.75rem;padding-top:1.25rem;border-top:1px solid var(--border);margin-top:1.5rem}
.sec-title{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="s-logo">
    <svg viewBox="0 0 792 174" fill="none"><path d="M144.723 0C141.658 33.8197 135.527 64.7803 126.33 92.8817C117.134 120.983 104.63 147.206 88.8185 171.549H56.1468C40.4967 147.532 28.0734 121.555 18.877 93.6169C9.68049 65.5155 3.38817 34.3099 0 0H38.2379C41.1421 27.7746 45.4983 52.9352 51.3066 75.4817C57.1149 98.0282 64.1332 117.062 72.3616 132.583C80.5901 117.062 87.6084 98.0282 93.4167 75.4817C99.225 52.9352 103.581 27.7746 106.485 0H144.723Z" fill="white"/><path d="M252.587 120.82C252.587 134.217 253.071 143.856 254.039 149.738C255.168 155.62 257.347 160.685 260.573 164.932C257.185 167.383 252.829 169.425 247.505 171.059C242.18 172.53 237.34 173.265 232.984 173.265C228.95 173.265 225.724 171.794 223.304 168.854C220.883 165.913 219.109 161.256 217.979 154.884C213.623 161.746 208.46 166.648 202.49 169.589C196.521 172.53 188.776 174 179.257 174C167.479 174 157.96 170.814 150.7 164.442C143.439 157.907 139.809 149.411 139.809 138.955C139.809 124.251 145.86 113.304 157.96 106.115C170.222 98.7634 189.825 94.3521 216.769 92.8817V80.138C216.769 73.4394 214.994 68.4563 211.445 65.1887C208.057 61.9211 202.813 60.2873 195.714 60.2873C190.551 60.2873 185.388 61.3493 180.225 63.4732C175.224 65.4338 169.012 68.9465 161.59 74.0113C158.202 74.9915 155.298 73.031 148.764 69.1099C145.537 65.1887 142.633 60.0423 140.051 53.6704C146.344 48.1155 155.137 43.5408 166.431 39.9465C177.886 36.1887 189.18 34.3099 200.312 34.3099C217.092 34.3099 229.999 38.3127 239.034 46.3183C248.069 54.1606 252.587 65.4338 252.587 80.138V120.82Z" fill="white"/><path d="M466.698 147.777C468.473 148.268 469.844 149.33 470.812 150.963C471.78 152.597 472.264 154.558 472.264 156.845C472.264 160.276 471.215 163.054 469.118 165.177C466.536 167.792 462.261 169.915 456.291 171.549C450.483 173.183 444.029 174 436.93 174C425.798 174 416.843 170.896 410.067 164.687C403.291 158.316 399.902 149.901 399.902 139.445V59.7972H379.573V36.7606H399.902V0H435.72V36.7606H460.89V59.7972H435.72V136.259C435.72 141.977 436.608 146.062 438.382 148.513C440.318 150.8 443.626 151.944 448.305 151.944C453.468 151.944 459.599 150.555 466.698 147.777Z" fill="white"/><path d="M750.858 34.3099C763.604 34.3099 773.607 38.1493 780.867 45.8282C788.289 53.3437 792 63.8 792 77.1972V171.549H755.94V77.9324C755.94 69.9268 754.811 64.5352 752.552 61.7578C750.455 58.8169 746.34 57.3465 740.209 57.3465C731.013 57.3465 723.269 61.431 716.976 69.6V171.549H681.158V75.4817C681.158 68.6197 680.19 63.8817 678.254 61.2676C676.48 58.6535 673.091 57.3465 668.09 57.3465C659.377 57.3465 650.584 62.6563 641.71 73.2761V171.549H605.893V85.0394C605.893 61.8394 604.925 47.5437 602.989 42.1521C606.054 40.3549 609.926 38.8845 614.605 37.7409C619.284 36.4338 623.56 35.7803 627.432 35.7803C631.788 35.7803 635.015 37.0873 637.112 39.7014C639.371 42.1521 640.823 46.4 641.468 52.4451C647.277 46.0732 653.327 41.4986 659.619 38.7211C665.912 35.7803 672.93 34.3099 680.674 34.3099C688.096 34.3099 694.55 35.862 700.035 38.9662C705.521 41.9071 709.716 46.2366 712.62 51.9549C721.655 40.1916 734.401 34.3099 750.858 34.3099Z" fill="white"/></svg>
    <span>Admin Panel</span>
  </div>
  <nav class="s-nav">
    <div class="s-section">Overview</div>
    <a href="/panel/" class="s-link {% block nav_dash %}{% endblock %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/></svg>
      Dashboard
    </a>
    <div class="s-section">Catalog</div>
    <a href="/panel/categories/" class="s-link {% block nav_cats %}{% endblock %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      Categories
    </a>
    <a href="/panel/products/" class="s-link {% block nav_prods %}{% endblock %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      Products
    </a>
    <a href="/panel/catalogs/" class="s-link {% block nav_catalogs %}{% endblock %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      Catalogs
    </a>
    <div class="s-section">Sales</div>
    <a href="/panel/quotes/" class="s-link {% block nav_quotes %}{% endblock %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Quote Requests
    </a>
  </nav>
  <div class="s-footer">
    <a href="/panel/logout/">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Sign out — {{ request.user.username }}
    </a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <span class="topbar-title">{% block topbar %}Dashboard{% endblock %}</span>
    <div class="topbar-right">
      <a href="/" target="_blank">↗ View Website</a>
    </div>
  </div>
  <div class="content">
    {% if messages %}<div class="msgs">{% for m in messages %}<div class="msg {{ m.tags }}">{{ m }}</div>{% endfor %}</div>{% endif %}
    {% block content %}{% endblock %}
  </div>
</div>

<script>
document.querySelectorAll('.file-zone').forEach(zone => {
  const input = zone.querySelector('input[type=file]');
  const text = zone.querySelector('.file-zone-text');
  if (!input || !text) return;
  input.addEventListener('change', () => {
    if (!input.files[0]) return;
    text.innerHTML = '<strong>' + input.files[0].name + '</strong>';
    if (input.files[0].type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        let img = zone.querySelector('.pv-img');
        if (!img) { img = document.createElement('img'); img.className = 'pv-img'; img.style.cssText = 'max-height:80px;border-radius:6px;margin-top:8px;border:1px solid #e5e7eb;display:block;margin-left:auto;margin-right:auto'; zone.appendChild(img); }
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    }
  });
});
const catSel = document.getElementById('cat-sel');
const subSel = document.getElementById('sub-sel');
if (catSel && subSel) {
  catSel.addEventListener('change', () => {
    if (!catSel.value) { subSel.innerHTML = '<option value="">— None —</option>'; return; }
    fetch('/panel/subs/' + catSel.value + '/').then(r => r.json()).then(data => {
      subSel.innerHTML = '<option value="">— None —</option>';
      data.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; subSel.appendChild(o); });
    });
  });
}
</script>
</body>
</html>
